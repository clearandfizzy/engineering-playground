services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: express-sqlite
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /app
    tty: true
    volumes:
      - ./server:/app:delegated
      - node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  node_modules: